<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>XDM - Register Extension</title>
  <link rel="stylesheet" href="styles.css">
  <script src="register.js"></script>
</head>

<body style="min-width: 400px;">
  <div class="header">
    <img src="xdm-logo-orange.png" alt="XDM" class="logo" onerror="this.style.display='none'">
    <div class="header-text">
      <div class="header-title">XDM Browser Monitor</div>
      <div class="header-subtitle">Registration Required</div>
    </div>
  </div>

  <div class="error-container">
    <div class="error-msg">
      Please register this extension with Xtreme Download Manager.
    </div>
    <p style="text-align: center; margin: 12px 0;">
      <a id="link" href="#" style="color: #FF6600; font-weight: 500;">Register with XDM</a>
    </p>
    <p style="text-align: center; font-size: 12px; color: #999;">
      Once registered, please restart your browser.
    </p>
  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>XDM - Monitoring Disabled</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body style="min-width: 400px;">
  <div class="header">
    <img src="xdm-logo-orange.png" alt="XDM" class="logo" onerror="this.style.display='none'">
    <div class="header-text">
      <div class="header-title">XDM Browser Monitor</div>
      <div class="header-subtitle">Monitoring Paused</div>
    </div>
    <div class="status-indicator" style="background: #FFC107;"></div>
  </div>

  <div class="disabled-msg">
    Browser monitoring is currently disabled in the XDM application settings.
    <br><br>
    To enable it, open <strong>XDM &rarr; Settings &rarr; Browser Integration</strong>
    and turn on browser monitoring.
  </div>
</body>

</html>
